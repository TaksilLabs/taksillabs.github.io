<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPLStats</title>
  <link rel="stylesheet" href="assets/css/style.css" />

  <meta property="og:title" content="SPLStats" />
  <meta property="og:description" content="All-Time Slapshot Premier League player, team, and career statistics." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://taksillabs.com/SPLStats/" />
  <meta property="og:image" content="https://taksillabs.com/SPLStats/assets/images/splstats-card.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="SPLStats" />
  <meta name="twitter:description" content="All-Time Slapshot Premier League statistics." />
  <meta name="twitter:image" content="https://taksillabs.com/SPLStats/assets/images/splstats-card.png" />

</head>
<body>
  <header>

  <nav class="site-nav">
    <a href="index.html" class="nav-card nav-home">
      HOME
    </a>
    <a href="players.html" class="nav-card active">
      PLAYERS
    </a>
    <a href="teams.html" class="nav-card nav-teams">
      TEAMS
    </a>
    <a href="franchises.html" class="nav-card nav-franchises">
      FRANCHISES
    </a>
  </nav>

    <h1>SPLStats</h1>
    <p>All-Time Slapshot Premier League Statistics</p>
  </header>

  <main>
    <section class="controls">

      <div class="region-buttons">
        <button data-region="all" class="active">All</button>
        <button data-region="east">East</button>
        <button data-region="central">Central</button>
        <button data-region="west">West</button>
      </div>

      <div class="season-type-buttons">
        <button data-season-type="regular_season" class="active">Regular Season</button>
        <button data-season-type="postseason">Post Season</button>
        <button data-season-type="combined">Combined</button>
      </div>

      <div class="division-buttons" id="divisionButtons"></div>

      <input id="searchInput" type="text" placeholder="Search player..." />
    </section>

    <section class="table-wrap">
      <table id="leaderboard">
        <thead>
          <tr>
            <th data-stat="rank">Rank</th>
            <th data-stat="player_name">Player</th>

            <th data-stat="seasons_played">Szns</th>
            <th data-stat="games_played">GP</th>
            <th data-stat="periods_played">Per</th>

            <th data-stat="goals">G</th>
            <th data-stat="assists">A</th>
            <th data-stat="points">P</th>
            <th data-stat="shots">SG</th>

            <th data-stat="save_percent">SV%</th>
            <th data-stat="gaa">GAA</th>
            <th data-stat="saves">SV</th>
            <th data-stat="blocks">BLK</th>

            <th data-stat="shots_against">SHA</th>
            <th data-stat="goals_against">GA</th>

            <th data-stat="takeaways">TA</th>
            <th data-stat="turnovers">TO</th>

            <th data-stat="faceoff_win_percent">FO%</th>
            <th data-stat="faceoffs_won">FOW</th>
            <th data-stat="faceoffs_lost">FOL</th>

            <th data-stat="post_hits">PH</th>
            <th data-stat="passes">PASS</th>
            <th data-stat="possession_time_sec">POSS</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script>
    let lastScrollY = window.scrollY;

    window.addEventListener("scroll", () => {
      const nav = document.querySelector(".site-nav");
      if (!nav) return;

      const currentScrollY = window.scrollY;
      const scrollingDown = currentScrollY > lastScrollY;
      const pastTop = currentScrollY > 120;

      if (scrollingDown && pastTop) {
        nav.classList.add("nav-hidden");
      } else {
        nav.classList.remove("nav-hidden");
      }

      lastScrollY = currentScrollY;
    });
  </script>

  <script src="assets/js/app.js"></script>
</body>
</html>
