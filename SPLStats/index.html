<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPLStats</title>
  <link rel="stylesheet" href="assets/css/style.css" />

  <meta property="og:title" content="SPLStats" />
  <meta property="og:description" content="All-Time Slapshot Premier League player, team, and career statistics." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://taksillabs.com/SPLStats/" />
  <meta property="og:image" content="https://taksillabs.com/SPLStats/assets/images/splstats-card.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="SPLStats" />
  <meta name="twitter:description" content="All-Time Slapshot Premier League statistics." />
  <meta name="twitter:image" content="https://taksillabs.com/SPLStats/assets/images/splstats-card.png" />

</head>
<body>
  <header>
    <h1>SPLStats</h1>
    <p>All-Time Slapshot Premier League Statistics</p>
  </header>

  <main>
    <section class="controls">

      <div class="region-buttons">
        <button data-region="all" class="active">All</button>
        <button data-region="east">East</button>
        <button data-region="central">Central</button>
        <button data-region="west">West</button>
      </div>

      <div class="season-type-buttons">
        <button data-season-type="regular_season" class="active">Regular Season</button>
        <button data-season-type="postseason">Post Season</button>
        <button data-season-type="combined">Combined</button>
      </div>

      <div class="division-buttons" id="divisionButtons"></div>

      <input id="searchInput" type="text" placeholder="Search player..." />
    </section>

    <section class="table-wrap">
      <table id="leaderboard">
        <thead>
          <tr>
            <th data-stat="rank">Rank</th>
            <th data-stat="player_name">Player</th>
            <th data-stat="games_played">GP</th>
            <th data-stat="goals">G</th>
            <th data-stat="assists">A</th>
            <th data-stat="points">PTS</th>
            <th data-stat="shots">Shots</th>
            <th data-stat="saves">Saves</th>
            <th data-stat="blocks">Blocks</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
