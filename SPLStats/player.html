<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPLStats Player</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header>
    <nav class="site-nav">
      <a href="index.html" class="nav-card nav-home">
          HOME
      </a>
      <a href="players.html" class="nav-card nav-players">
          PLAYERS
      </a>
      <a href="teams.html" class="nav-card nav-teams">
          TEAMS
      </a>
      <a href="franchises.html" class="nav-card nav-franchises">
          FRANCHISES
      </a>
      <a href="championships.html" class="nav-card nav-championships">
        CHAMPIONSHIPS
      </a>
    </nav>

    <h1 id="playerName">Player</h1>
  </header>

  <main>

    <div class="player-card" id="championshipsCard" style="display: none;">
      <h2>Championships</h2>
      <div id="playerChampionships" class="championship-carousel"></div>
      <div id="playerChampionshipCounts" class="championship-counts"></div>
    </div>

    <div class="player-card">
      <div class="player-card career-totals-card" id="careerTotalsCard">
      <h2>Career Totals</h2>
      <div id="careerStats"></div>
    </div>

    <section class="player-card">
      <h2 class="section-title">Team History</h2>
      <p id="teamsPlayed"></p>
    </section>

    <section class="player-card">
      <h2>Season History</h2>
      <div class="table-wrap">
        <table id="seasonTable">
          <thead>
            <tr>
              <th>Season</th>
              <th>Division</th>
              <th>Team</th>
              <th>GP</th>
              <th>G</th>
              <th>A</th>
              <th>PTS</th>
              <th>Shots</th>
              <th>Saves</th>
              <th>Blocks</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="assets/js/player.js"></script>
</body>
</html>
