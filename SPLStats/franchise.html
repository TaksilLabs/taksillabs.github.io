<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Franchise | SPLStats</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="franchise-page">
  <header>
    <nav class="site-nav">
        <a href="index.html" class="nav-card nav-home">
            HOME
        </a>
        <a href="players.html" class="nav-card nav-players">
            PLAYERS
        </a>
        <a href="teams.html" class="nav-card nav-teams">
            TEAMS
        </a>
        <a href="franchises.html" class="nav-card nav-franchises">
            FRANCHISES
        </a>
    </nav>

    <h1 id="franchiseName">Franchise</h1>
    <p id="franchiseStatus"></p>
    <div id="franchiseHeaderStats" class="stat-grid"></div>
  </header>

  <main>

    <div class="player-card" id="franchiseChampionshipsCard" style="display: none;">
        <h2>Championships</h2>
        <div id="franchiseChampionships" class="championship-carousel"></div>
        <div id="franchiseChampionshipCounts" class="championship-counts"></div>
    </div>

    <details open class="franchise-section">
        <summary>Franchise Info</summary>
        <div id="franchiseInfo"></div>
    </details>

    <div class="player-card franchise-stat-card">
        <h2>Franchise Statistics</h2>
        <div id="franchiseStats" class="franchise-stats-grid"></div>
    </div>

    <details open class="franchise-section">
        <summary>Teams</summary>
        <div id="franchiseTeams" class="team-hub-grid"></div>
    </details>

    <details class="franchise-section">
        <summary>Hall of Fame</summary>
        <div id="franchiseHOF"></div>
    </details>
    
    <details class="franchise-section" id="franchiseLeadersPro">
        <summary>Franchise Leaders (Pro Division)</summary>
        <div class="leader-grid" id="leadersPro"></div>
    </details>

    <details class="franchise-section" id="franchiseLeadersAll">
        <summary>Franchise Leaders (All Divisions)</summary>
        <div class="leader-grid" id="leadersAll"></div>
    </details>

    <details class="franchise-section">
        <summary>Franchise Player Stats</summary>

        <div class="controls">
            <input
                type="text"
                id="franchisePlayerSearch"
                placeholder="Search player..."
            />
        </div>

        <div class="table-wrapper">
            <table id="franchisePlayerTable">
                <thead>
                    <tr>
                        <th class="stat-header">#</th>
                        <th class="stat-header">Player</th>

                        <th data-sort="games_played" class="stat-header">GP</th>
                        <th data-sort="periods_played" class="stat-header">Per</th>
                        <th data-sort="seasons_played" class="stat-header">Szns</th>

                        <th data-sort="goals" class="stat-header">G</th>
                        <th data-sort="assists" class="stat-header">A</th>
                        <th data-sort="points" class="stat-header">P</th>

                        <th data-sort="shots" class="stat-header">SOG</th>
                        <th data-sort="saves" class="stat-header">SV</th>
                        <th data-sort="blocks" class="stat-header">BLKS</th>

                        <th data-sort="faceoffs_won" class="stat-header">FOW</th>
                        <th data-sort="faceoffs_lost" class="stat-header">FOL</th>

                        <th data-sort="takeaways" class="stat-header">TA</th>
                        <th data-sort="turnovers" class="stat-header">TO</th>

                        <th data-sort="post_hits" class="stat-header">PH</th>
                        <th data-sort="passes" class="stat-header">PASS</th>

                        <th data-sort="possession_time_sec" class="stat-header">Poss</th>
                    </tr>
                </thead>

                <tbody></tbody>
            </table>
        </div>
    </details>
  </main>

  <script src="assets/js/franchise.js"></script>
</body>
</html>
