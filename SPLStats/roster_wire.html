<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Roster Wire | SPLStats</title>

  <link rel="stylesheet" href="assets/css/fonts.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/roster_wire.css">

  <link rel="icon" type="image/png" href="assets/images/splstats-card.png">
</head>

<body>
  <header class="roster-wire-header">
    <nav class="site-nav">
      <a href="index.html" class="nav-card nav-home">HOME</a>
      <a href="players.html" class="nav-card nav-players">PLAYERS</a>
      <a href="teams.html" class="nav-card nav-teams">TEAMS</a>
      <a href="divisions.html" class="nav-card nav-divisions">DIVISIONS</a>
      <a href="championships.html" class="nav-card nav-championships">CHAMPIONSHIPS</a>
    </nav>

    <section class="roster-wire-hero">
        <div>
            <span class="roster-wire-kicker">Slapshot Premier League</span>
            <h1>Roster Wire</h1>

            <p>
            Follow every active roster move across the Summer 2026 regular season.
            </p>

            <div class="roster-lock-countdown" id="rosterLockCountdown">
            <span class="roster-lock-label">Time until Roster Lock</span>

            <div class="roster-lock-time">
                <span>
                <strong id="rosterLockDays">--</strong>
                Days
                </span>

                <span>
                <strong id="rosterLockHours">--</strong>
                Hours
                </span>

                <span>
                <strong id="rosterLockMinutes">--</strong>
                Min
                </span>

                <span>
                <strong id="rosterLockSeconds">--</strong>
                Sec
                </span>
            </div>

            <span class="roster-lock-date">
                Locks Sunday, July 26 at 11:59 PM Eastern
            </span>
            </div>
        </div>
    </section>
  </header>

  <main class="roster-wire-layout">
    <section class="roster-wire-controls">
      <div class="filter-group">
        <span class="filter-title">Regions</span>
        <div id="regionFilters" class="filter-buttons"></div>
      </div>

      <div class="filter-group">
        <span class="filter-title">Divisions</span>
        <div id="divisionFilters" class="filter-buttons"></div>
      </div>
    </section>

    <section id="rosterWireTimeline" class="roster-wire-timeline">
      <div class="roster-wire-empty">Loading roster wire...</div>
    </section>

    <div id="rosterWireSentinel" class="roster-wire-sentinel"></div>
  </main>

  <script src="assets/js/roster_wire.js"></script>
</body>
</html>
