<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Team Page</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header>
  <nav class="site-nav">
    <a href="index.html" class="nav-card nav-home">
        HOME
    </a>
    <a href="players.html" class="nav-card nav-players">
        PLAYERS
    </a>
    <a href="teams.html" class="nav-card nav-teams">
        TEAMS
    </a>
    <a href="franchises.html" class="nav-card nav-franchises">
        FRANCHISES
    </a>
  </nav>

  <h1 id="teamName">Loading...</h1>
</header>

<main>

  <div class="player-card">
    <h2>Team Records</h2>
    <div id="teamLeaders" class="leader-grid"></div>
  </div>

  <div class="player-card">
    <h2>Career Totals</h2>
    <div id="careerStats" class="stat-grid"></div>
  </div>

  <section id="teamFranchiseSection" class="team-franchise-section" style="display: none;">
    <h2>Franchise</h2>
    <div id="teamFranchiseCard"></div>
  </section>

  <div class="player-card">
    <h2>Seasons Active</h2>
    <div id="seasonList"></div>
  </div>

  <div class="player-card">
    <h2>Divisions Played</h2>
    <div id="divisionList"></div>
  </div>

  <div class="player-card">
    <h2>All-Time Roster</h2>

    <div class="table-wrap">
      <table id="rosterTable">
        <thead>
          <tr>
            <th>Player</th>
            <th>GP</th>
            <th>G</th>
            <th>A</th>
            <th>PTS</th>
            <th>SH</th>
            <th>SV</th>
            <th>BLK</th>
            <th>PASS</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

  </div>

</main>

<script src="assets/js/team.js"></script>

</body>
</html>
