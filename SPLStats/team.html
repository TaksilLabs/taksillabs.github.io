<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Team Page</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header>
  <h1 id="teamName">Loading...</h1>
  <a href="index.html">← Back to Leaderboard</a>
</header>

<main>

  <div class="player-card">
    <h2>Team Records</h2>
    <div id="teamLeaders" class="leader-grid"></div>
  </div>

  <div class="player-card">
    <h2>Career Totals</h2>
    <div id="careerStats" class="stat-grid"></div>
  </div>

  <div class="player-card">
    <h2>Seasons Active</h2>
    <div id="seasonList"></div>
  </div>

  <div class="player-card">
    <h2>Divisions Played</h2>
    <div id="divisionList"></div>
  </div>

  <div class="player-card">
    <h2>All-Time Roster</h2>

    <div class="table-wrap">
      <table id="rosterTable">
        <thead>
          <tr>
            <th>Player</th>
            <th>GP</th>
            <th>G</th>
            <th>A</th>
            <th>PTS</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

  </div>

</main>

<script src="assets/js/team.js"></script>

</body>
</html>
